<template>
    <template if:true={hasChildren}>
        <section class="node">
            <div class="node-header">
                <span class="node-label">{node.Name}</span>
            </div>

            <div class="node-children">
                <template if:true={allChildrenAreLeaf}>
                    <div class="tag-group">
                        <template for:each={node.children} for:item="child">
                            <span key={child.Id} class="skill-tag">
                                {child.Name}
                            </span>
                        </template>
                    </div>
                </template>

                <template if:false={allChildrenAreLeaf}>
                    <template for:each={node.children} for:item="child">
                        <c-skill-node key={child.Id} node={child}>
                        </c-skill-node>
                    </template>
                </template>
            </div>
        </section>
    </template>

    <template if:false={hasChildren}>
        <span class="skill-tag">{node.Name}</span>
    </template>
</template>
