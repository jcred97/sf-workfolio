<template>
    <div class="container">
        <div class="content">

            <!-- PROFILE HEADER -->
            <div class="profile-header">
                <img src={profilePicture} class="profile-pic"/>

                <div class="profile-text">
                    <h1>{fullName}</h1>
                    <h2>{designation}</h2>
                </div>
            </div>

            <!-- DESCRIPTION -->
            <h3>{experienceSummary}{introduction}</h3>
            <p>{subIntroduction}</p>
            
            <!-- SOCIAL LINKS -->
            <div class="slds-grid social-links">
                <template if:true={linkedinUrl}>
                    <a href={linkedinUrl} target="_blank">
                        <img src={linkedin} class="social-icon"/>
                    </a>
                </template>

                <template if:true={githubUrl}>
                    <a href={githubUrl} target="_blank">
                        <img src={github} class="social-icon"/>
                    </a>
                </template>

                <template if:true={trailblazerUrl}>
                    <a href={trailblazerUrl} target="_blank">
                        <img src={trailblazer} class="social-icon"/>
                    </a>
                </template>
            </div>
        </div>

        <!-- RIGHT SIDE IMAGE -->
        <div class="cert-grid">
            <template for:each={certifications} for:item="cert">
                <img key={cert.name} src={cert.image} class="cert-badge"/>
            </template>
        </div>
    </div>

    <!-- CONTACT SECTION (MOVED FROM SEPARATE PAGE) -->
    <div class="contact-section">
        <h2 class="contact-title">Let’s work together</h2>
        <c-portfolio-contact
            record-id={recordId}
            linkedin={linkedin}
            linkedin-url={linkedinUrl}
            github={github}
            github-url={githubUrl}
            trailblazer={trailblazer}
            trailblazer-url={trailblazerUrl}>
        </c-portfolio-contact>
    </div>
</template>
