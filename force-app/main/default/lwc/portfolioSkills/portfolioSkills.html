<template>
    <div class="container">
        <template for:each={treeData} for:item="category">
            <div key={category.Id} class={category.cssClass}>

                <!-- HEADER -->
                <div class="card-header"
                     onclick={toggleCard}
                     data-id={category.Id}>

                    <h3>{category.Name}</h3>

                    <!-- Use precomputed boolean flag — avoids .length access on potentially undefined array -->
                    <template if:true={category.hasChildren}>
                        <span class="toggle">{category.icon}</span>
                    </template>
                </div>

                <!-- BODY
                     Always in DOM — animated via card-body open/closed class.
                     Never use if:true here or the close animation has nothing to run on.
                -->
                <div class={category.bodyClass}>

                    <!-- TAG MODE: all children are leaf nodes -->
                    <template if:true={category.allChildrenAreLeaf}>
                        <div class="node-children">
                            <div class="tag-group">
                                <template for:each={category.children} for:item="child">
                                    <span key={child.Id} class="skill-tag">
                                        {child.Name}
                                    </span>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- TREE MODE: children have their own children -->
                    <template if:false={category.allChildrenAreLeaf}>
                        <template for:each={category.children} for:item="child">
                            <c-skill-node
                                key={child.Id}
                                node={child}
                                ontoggle={handleToggle}>
                            </c-skill-node>
                        </template>
                    </template>

                </div>

            </div>
        </template>
    </div>
</template>
