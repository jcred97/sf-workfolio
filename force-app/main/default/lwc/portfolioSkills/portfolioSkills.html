<template>
    <div class="container">
        <template for:each={treeData} for:item="category">
            <div key={category.Id} class="skill-card">

                <!-- HEADER -->
                <div class="card-header"
                     onclick={toggleCard}
                     data-id={category.Id}>

                    <h3>{category.Name}</h3>

                    <template if:true={category.children.length}>
                        <span class="toggle">{category.icon}</span>
                    </template>
                </div>

                <!-- BODY -->
                <template if:true={category.isOpen}>
                    <div class="card-body">

                        <!-- TAG MODE -->
                        <template if:true={category.allChildrenAreLeaf}>
                            <div class="node-children">
                                <div class="tag-group">
                                    <template for:each={category.children} for:item="child">
                                        <span key={child.Id} class="skill-tag">
                                            {child.Name}
                                        </span>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- TREE MODE -->
                        <template if:false={category.allChildrenAreLeaf}>
                            <template for:each={category.children} for:item="child">
                                <c-skill-node 
                                    key={child.Id} 
                                    node={child}
                                    ontoggle={handleToggle}
                                    ontagclick={handleTagClick}>
                                </c-skill-node>
                            </template>
                        </template>

                    </div>
                </template>

            </div>
        </template>
    </div>
</template>
