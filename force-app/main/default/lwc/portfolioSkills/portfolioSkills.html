<template>
    <template if:true={hasError}>
        <div class="error-container">
            <div class="error-card">
                <span class="error-icon">!</span>
                <p class="error-message">{errorMessage}</p>
            </div>
        </div>
    </template>

    <template if:true={isLoading}>
        <div class="skel-container">
            <div class="skel skel-skill-card"></div>
            <div class="skel skel-skill-card"></div>
            <div class="skel skel-skill-card"></div>
        </div>
    </template>

    <template if:true={showContent}>
        <div class="container">
            <template for:each={treeData} for:item="category">
                <article key={category.Id} class={category.cardClass}>
                    <div class="card-header">
                        <h3>{category.Name}</h3>
                    </div>

                    <div class="card-body">
                        <template if:true={category.allChildrenAreLeaf}>
                            <div class="tag-group">
                                <template
                                    for:each={category.children}
                                    for:item="child"
                                >
                                    <span key={child.Id} class="skill-tag">
                                        {child.Name}
                                    </span>
                                </template>
                            </div>
                        </template>

                        <template if:false={category.allChildrenAreLeaf}>
                            <template
                                for:each={category.children}
                                for:item="child"
                            >
                                <c-skill-node key={child.Id} node={child}>
                                </c-skill-node>
                            </template>
                        </template>
                    </div>
                </article>
            </template>
        </div>
    </template>
</template>
