<template>
    <div class="body">
        <nav>
            <div class="nav-logo">
                <a href="#">JOHN CARLO RED</a>
            </div>
    
            <ul class="nav-links">
                <li class="link">
                    <a class={homeClass} onclick={handleDisplayHome}>Home</a>
                </li>
                <li class="link">
                    <a class={experienceClass} onclick={handleDisplayExperience}>Experience</a>
                </li>
            </ul>
        </nav>

        <div class="content">
            <template if:true={showHome}>
                <c-portfolio-home 
                    record-id={recordId} 
                    linkedin={linkedin} 
                    linkedin-url={linkedinUrl} 
                    trailblazer={trailblazer}
                    trailblazer-url={trailblazerUrl} 
                    profile-picture={profilePicture}
                    certifications={certifications}> 
                </c-portfolio-home>
            </template>
    
            <template if:true={showExperience}>
                <c-portfolio-experience record-id={recordId}> 
                </c-portfolio-experience>
            </template>
        </div>
    </div>
</template>
