<template>
    <div class="body">
        <nav>
            <div class="nav-logo">
                <a href="#">JOHN CARLO RED</a>
            </div>

            <ul class="nav-links">
                <li class="link">
                    <a class={homeClass} data-section="home" onclick={handleNavigation}>Home</a>
                </li>
                <li class="link">
                    <a class={experienceClass} data-section="experience" onclick={handleNavigation}>Experience</a>
                </li>
                <li class="link">
                    <a class={skillsClass} data-section="skills" onclick={handleNavigation}>Skills</a>
                </li>
            </ul>
        </nav>

        <div class="content">
            <template if:true={showHome}>
                <c-portfolio-home 
                    record-id={recordId} 
                    linkedin={social.linkedin} 
                    linkedin-url={linkedinUrl} 
                    trailblazer={social.trailblazer}
                    trailblazer-url={trailblazerUrl} 
                    profile-picture={profilePicture}
                    certifications={certifications}>
                </c-portfolio-home>
            </template>

            <template if:true={showExperience}>
                <c-portfolio-experience record-id={recordId}></c-portfolio-experience>
            </template>

            <template if:true={showSkills}>
                <c-portfolio-skills record-id={recordId}></c-portfolio-skills>
            </template>
        </div>
    </div>
</template>
