<template>
    <div class="body">

        <!-- ========================================
             NAVBAR
        ========================================= -->
        <nav>
            <!-- LOGO -->
            <div class="nav-logo">
                <a href="#">{fullName}</a>
            </div>

            <!-- NAV LINKS -->
            <ul class="nav-links">
                <li class="link">
                    <a class={homeClass} data-section="home" onclick={handleNavigation}>Home</a>
                </li>
                <li class="link">
                    <a class={experienceClass} data-section="experience" onclick={handleNavigation}>Experience</a>
                </li>
                <li class="link">
                    <a class={skillsClass} data-section="skills" onclick={handleNavigation}>Skills</a>
                </li>
            </ul>
        </nav>

        <!-- ========================================
             CONTENT WRAPPER (WITH TRANSITION)
        ========================================= -->
        <div class={contentClass}>

            <!-- HOME -->
            <template if:true={showHome}>
                <c-portfolio-home
                    record-id={recordId}
                    linkedin={social.linkedin}
                    trailblazer={social.trailblazer}
                    github={social.github}
                    profile-picture={profilePicture}
                    onnamechange={handleNameChange}>
                </c-portfolio-home>
            </template>

            <!-- EXPERIENCE -->
            <template if:true={showExperience}>
                <c-portfolio-experience
                    record-id={recordId}>
                </c-portfolio-experience>
            </template>

            <!-- SKILLS -->
            <template if:true={showSkills}>
                <c-portfolio-skills
                    record-id={recordId}>
                </c-portfolio-skills>
            </template>

        </div>

        <!-- FOOTER -->
        <footer class="copyright">
            &copy; {currentYear} John Carlo Red. All rights reserved.
        </footer>

    </div>
</template>
