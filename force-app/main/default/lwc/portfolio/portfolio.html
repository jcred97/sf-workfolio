<template>
    <div class="body">
        <!-- ========================================
             NAVBAR
        ========================================= -->
        <nav>
            <!-- LOGO -->
            <div class="nav-logo">
                <a href="#">{fullName}</a>
            </div>

            <!-- HAMBURGER BUTTON (mobile only) -->
            <button
                class={hamburgerClass}
                onclick={toggleMenu}
                aria-label="Toggle navigation"
            >
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <!-- NAV LINKS -->
            <ul class={navLinksClass}>
                <li class="link">
                    <a
                        class={homeClass}
                        data-section="home"
                        onclick={handleNavigation}
                        >Home</a
                    >
                </li>
                <li class="link">
                    <a
                        class={experienceClass}
                        data-section="experience"
                        onclick={handleNavigation}
                        >Experience</a
                    >
                </li>
                <li class="link">
                    <a
                        class={projectsClass}
                        data-section="projects"
                        onclick={handleNavigation}
                        >Projects</a
                    >
                </li>
                <li class="link">
                    <a
                        class={skillsClass}
                        data-section="skills"
                        onclick={handleNavigation}
                        >Skills</a
                    >
                </li>
            </ul>
        </nav>

        <!-- ========================================
             CONTENT WRAPPER (WITH TRANSITION)
        ========================================= -->
        <div class={contentClass}>
            <!-- HOME -->
            <template if:true={hasLoadedHome}>
                <section class={homeSectionClass} aria-hidden={homeAriaHidden}>
                    <c-portfolio-home
                        record-id={recordId}
                        linkedin={social.linkedin}
                        trailblazer={social.trailblazer}
                        github={social.github}
                        profile-picture={profilePicture}
                        onnamechange={handleNameChange}
                        onsectionchange={handleHomeSectionChange}
                    >
                    </c-portfolio-home>
                </section>
            </template>

            <!-- EXPERIENCE -->
            <template if:true={hasLoadedExperience}>
                <section
                    class={experienceSectionClass}
                    aria-hidden={experienceAriaHidden}
                >
                    <c-portfolio-experience record-id={recordId}>
                    </c-portfolio-experience>
                </section>
            </template>

            <!-- PROJECTS -->
            <template if:true={hasLoadedProjects}>
                <section
                    class={projectsSectionClass}
                    aria-hidden={projectsAriaHidden}
                >
                    <c-portfolio-projects record-id={recordId}>
                    </c-portfolio-projects>
                </section>
            </template>

            <!-- SKILLS -->
            <template if:true={hasLoadedSkills}>
                <section
                    class={skillsSectionClass}
                    aria-hidden={skillsAriaHidden}
                >
                    <c-portfolio-skills record-id={recordId}>
                    </c-portfolio-skills>
                </section>
            </template>
        </div>

        <!-- FOOTER -->
        <footer class="copyright">
            &copy; {currentYear} John Carlo Red. All rights reserved.
        </footer>
    </div>
</template>
